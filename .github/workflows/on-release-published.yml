name: 🌍 Release
run-name: Release ${{ github.event.release.tag_name }}

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.release.tag_name }}

jobs:
  release-nuget:
    runs-on: ubuntu-latest
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.201

      - name: Download GitHub release artifacts
        uses: robinraju/release-downloader@v1.11
        with:
          tag: ${{ env.RELEASE_TAG }}
          fileName: '*.nupkg'

      - name: Push packages to NuGet
        run: |
          shopt -s nullglob
          for pkg in ./*.nupkg; do
            dotnet nuget push "$pkg" --skip-duplicate --api-key "${{ secrets.NUGET_KEY }}" --source https://api.nuget.org/v3/index.json
          done

  release-npm:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.release.tag_name }}
      PACKAGE_NAME: '@magnusopera/fscript'
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm package artifact
        uses: robinraju/release-downloader@v1.11
        with:
          tag: ${{ env.RELEASE_TAG }}
          fileName: '*.tgz'

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::NPM_KEY secret is not configured."
            exit 1
          fi

          shopt -s nullglob
          packages=(./*.tgz)
          if [[ "${#packages[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one audited npm .tgz release asset, found ${#packages[@]}."
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${RELEASE_VERSION} is already published; skipping."
            exit 0
          fi

          npm publish "${packages[0]}" --access public --provenance

  publish-vscode-marketplace:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download VSIX artifact
        uses: robinraju/release-downloader@v1.11
        with:
          tag: ${{ env.RELEASE_TAG }}
          fileName: '*.vsix'

      - name: Install VS Code publishing tool
        run: npm install -g @vscode/vsce@3.5

      - name: Publish to VS Code Marketplace
        shell: bash
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: ./.github/scripts/publish-vscode-marketplace.sh

  publish-open-vsx:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download VSIX artifact
        uses: robinraju/release-downloader@v1.11
        with:
          tag: ${{ env.RELEASE_TAG }}
          fileName: '*.vsix'

      - name: Install Open VSX publishing tool
        run: npm install -g ovsx@0.9

      - name: Publish to Open VSX
        shell: bash
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: ./.github/scripts/publish-open-vsx.sh

  sign-and-notarize:
    runs-on: macos-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download unsigned macOS artifacts
        uses: robinraju/release-downloader@v1.11
        with:
          tag: ${{ env.RELEASE_TAG }}
          fileName: 'fscript-*-darwin-unsigned.zip'

      - name: Extract binaries
        run: |
          mkdir -p .out/darwin
          unzip -d .out/darwin fscript-${{ env.RELEASE_TAG }}-darwin-unsigned.zip
          test -f .out/darwin/entitlements.plist

      - name: Add cert to keychain
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERT_BASE64 }}
          p12-password: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Sign binaries
        run: |
          expected_identifier="io.magnusopera.fscript.arm64"
          codesign \
            --force \
            --timestamp \
            --options=runtime \
            --no-strict \
            --entitlements .out/darwin/entitlements.plist \
            --identifier "$expected_identifier" \
            --sign "Developer ID Application: Magnus Opera (${{ secrets.MAC_DEV_TEAM_ID }})" \
            .out/darwin/arm64/fscript
          codesign --verify --verbose=4 .out/darwin/arm64/fscript
          actual_identifier="$(codesign -dv --verbose=4 .out/darwin/arm64/fscript 2>&1 | sed -n 's/^Identifier=//p')"
          if [ "$actual_identifier" != "$expected_identifier" ]; then
            echo "Expected codesign identifier '$expected_identifier' but found '$actual_identifier'" >&2
            exit 1
          fi
          (cd .out/darwin/arm64; zip ../fscript-${{ env.RELEASE_TAG }}-darwin-arm64.zip ./*)

      - name: Notarize arm64
        timeout-minutes: 10
        shell: bash
        env:
          MAC_DEV_LOGIN: ${{ secrets.MAC_DEV_LOGIN }}
          MAC_DEV_PASSWORD: ${{ secrets.MAC_DEV_PASSWORD }}
          MAC_DEV_TEAM_ID: ${{ secrets.MAC_DEV_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${MAC_DEV_LOGIN:-}" || -z "${MAC_DEV_PASSWORD:-}" || -z "${MAC_DEV_TEAM_ID:-}" ]]; then
            echo "::error::MAC_DEV_LOGIN, MAC_DEV_PASSWORD, and MAC_DEV_TEAM_ID secrets are required for notarization."
            exit 1
          fi

          set +e
          submit_output="$(xcrun notarytool submit ".out/darwin/fscript-${RELEASE_TAG}-darwin-arm64.zip" \
            --apple-id "${MAC_DEV_LOGIN}" \
            --password "${MAC_DEV_PASSWORD}" \
            --team-id "${MAC_DEV_TEAM_ID}" \
            --wait \
            --output-format json 2>&1)"
          submit_status=$?
          set -e

          printf '%s\n' "${submit_output}"

          submission_id="$(printf '%s\n' "${submit_output}" | node -e 'const fs = require("node:fs"); const input = fs.readFileSync(0, "utf8"); try { const data = JSON.parse(input); process.stdout.write(data.id || ""); } catch { process.exit(0); }')"
          notarization_status="$(printf '%s\n' "${submit_output}" | node -e 'const fs = require("node:fs"); const input = fs.readFileSync(0, "utf8"); try { const data = JSON.parse(input); process.stdout.write(data.status || ""); } catch { process.exit(0); }')"

          if [[ -n "${submission_id}" && "${notarization_status}" != "Accepted" ]]; then
            echo "::group::Apple notarization log"
            xcrun notarytool log \
              --apple-id "${MAC_DEV_LOGIN}" \
              --password "${MAC_DEV_PASSWORD}" \
              --team-id "${MAC_DEV_TEAM_ID}" \
              "${submission_id}" \
              notary-log.json || true
            if [[ -f notary-log.json ]]; then
              cat notary-log.json
            fi
            echo "::endgroup::"
          fi

          if [[ "${submit_status}" -ne 0 || "${notarization_status}" != "Accepted" ]]; then
            echo "::error::Notarization failed with status '${notarization_status:-unknown}'."
            exit 1
          fi

      - name: Upload signed macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            .out/darwin/fscript-${{ env.RELEASE_TAG }}-darwin-arm64.zip

      - name: Remove unsigned macOS artifact
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const tag = process.env.RELEASE_TAG;
              const unsignedName = `fscript-${tag}-darwin-unsigned.zip`;
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              const asset = release.assets.find(a => a.name === unsignedName);
              if (!asset) {
                core.info(`Unsigned artifact not found: ${unsignedName}`);
                return;
              }
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
              core.info(`Deleted unsigned artifact: ${unsignedName}`);
            } catch (error) {
              core.warning(`Best-effort cleanup failed: ${error?.message ?? error}`);
            }

  update-homebrew-tap:
    uses: ./.github/workflows/release-homebrew-tap.yml
    needs:
      - sign-and-notarize
    with:
      ref: ${{ format('refs/tags/{0}', github.event.release.tag_name) }}
      version: ${{ github.event.release.tag_name }}
      dry-run: false
    secrets: inherit
